<!DOCTYPE html>
<html>
<head>
  <title>Consignment Calculator</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; line-height: 1.5; }
    h1 { color: #333; }
    input { padding: 12px; font-size: 20px; width: 200px; }
    table { margin-top: 30px; border-collapse: collapse; width: 100%; max-width: 1100px; }
    th, td { padding: 12px; border: 1px solid #ddd; text-align: right; }
    th { text-align: left; background: #f0f0f0; }
    tr:nth-child(even) { background: #f9f9f9; }
  </style>
</head>
<body>
  <h1>Consignment Sale Calculator</h1>
  <p>Enter sale price: <input type="number" id="price" value="100" oninput="update()"></p>

  <table id="table"></table>

  <script>
    const scriptURL = "https://script.google.com/macros/s/AKfycbzJ7ZEF3Z4e3TsjCBMJUN895mEejqWY4nBp3P4gGHaOFN5KQG7rs5ohF2ahSrV8DGLq/exec";

    async function update() {
      const price = document.getElementById("price").value || 100;
      const url = `${scriptURL}?price=${price}`;
      
      try {
        const res = await fetch(url);
        const data = await res.json();
        
        let html = "<tr>";
        const headers = ["Platform","Fee","Net Payout","Margin","Profit"]; // update these if needed
        headers.forEach(h => html += `<th>${h}</th>`);
        html += "</tr>";
        
        data.slice(1).forEach(row => {
          html += "<tr>";
          row.forEach(cell => html += `<td>${cell}</td>`);
          html += "</tr>";
        });
        
        document.getElementById("table").innerHTML = html;
      } catch(e) {
        document.getElementById("table").innerHTML = "<tr><td colspan='5'>Loading...</td></tr>";
      }
    }

    update();
  </script>
</body>
</html>
