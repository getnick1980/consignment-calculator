<!DOCTYPE html>
<html>
<head>
  <title>Consignment Calculator</title>
  <style>
    body {font-family:Arial,sans-serif;margin:20px;}
    input {font-size:18px;padding:12px;width:200px;margin:10px 15px 10px 0;}
  </style>
</head>
<body>

  <h2>Enter Values</h2>
  <input type="number" id="salePrice" placeholder="Sale price" oninput="update()">
  <input type="number" id="cost" placeholder="Cost" oninput="update()">

  <h2 style="margin-top:30px;">Results</h2>
  <iframe id="frame" width="100%" height="850px" frameborder="0"></iframe>

  <script>
    const scriptUrl = "https://script.google.com/macros/s/AKfycbzxITQHtRyWMZOkttQ7CqJj_cEqUYxUGr-wLwFXGFYG6Hp0mjz6mTebfxcpD3zbQ1aF/exec";

    async function update() {
      const sale = document.getElementById("salePrice").value;
      const cost = document.getElementById("cost").value || 0;

      if (!sale) return;

      await fetch(scriptUrl + "?price=" + sale + "&cost=" + cost);

      const iframe = document.getElementById("frame");
      iframe.src = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTaw0RrL5tsjG83-C3iEFWYJNLW2KlizBMWv6CHcylWVd262-_TBpgCtTvpRJTy4NXBZcrYc87Db_2U/pubhtml?gid=1364386720&single=true&t=" + Date.now();
    }
  </script>
</body>
</html>
