<!DOCTYPE html>
<html>
<head>
  <title>Consignment Calculator</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    input { padding: 12px; font-size: 20px; width: 200px; }
    iframe { width: 100%; height: 800px; border: 2px solid #ccc; border-radius: 8px; }
  </style>
</head>
<body>
  <h1>Consignment Sale Calculator</h1>
  <p>Sale Price: <input type="number" id="price" value="100" oninput="updatePrice()"></p>
  
  <iframe id="sheetFrame" src="https://docs.google.com/spreadsheets/d/e/2PACX-1vTaw0RrL5tsjG83-C3iEFWYJNLW2KlizBMWv6CHcylWVd262-_TBpgCtTvpRJTy4NXBZcrYc87Db_2U/pubhtml?gid=204546721&amp;single=true&amp;widget=false&amp;headers=false"></iframe>

  <script>
    function updatePrice() {
      const price = document.getElementById("price").value || 100;
      const iframe = document.getElementById("sheetFrame");
      iframe.src = iframe.src.split('?')[0] + `?price=${price}`; // this won't actually work, but keeps it simple
    }
  </script>
</body>
</html>
