<!DOCTYPE html>
<html>
<head>
  <title>Consignment Calculator</title>
  <style>
    body {font-family:Arial,sans-serif;margin:20px;}
    input {font-size:18px;padding:12px;width:200px;margin-right:15px;}
    .hidden {display:none;}
  </style>
</head>
<body>

  <h2>Enter Values</h2>
  <input type="number" id="salePrice" placeholder="Sale price" oninput="updateTable()">
  <input type="number" id="cost" placeholder="Cost" oninput="updateTable()">

  <div id="resultsArea" class="hidden">
    <h2>Results</h2>
    <iframe id="frame" width="100%" height="850px" frameborder="0"></iframe>
  </div>

  <script>
    const scriptUrl = "https://script.google.com/macros/s/AKfycbwuHnnBqzKhggiD1COQ9FVPeVfb0o6sMPeITmcuuGui4-bX3SzKDdHblzGACEd7Q2Xh/exec";

    window.onload = () => {
      document.getElementById("salePrice").value = "";
      document.getElementById("cost").value = "";
    };

    async function updateTable() {
      const salePrice = document.getElementById("salePrice").value;
      const cost = document.getElementById("cost").value;

      const area = document.getElementById("resultsArea");

      if (salePrice && cost) {
        const url = scriptUrl + "?price=" + salePrice + "&cost=" + cost;
        await fetch(url);

        area.classList.remove("hidden");
        document.getElementById("frame").src = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTaw0RrL5tsjG83-C3iEFWYJNLW2KlizBMWv6CHcylWVd262-_TBpgCtTvpRJTy4NXBZcrYc87Db_2U/pubhtml?gid=1364386720&single=true&t=" + Date.now();
      } else {
        area.classList.add("hidden");
      }
    }
  </script>
</body>
</html>
