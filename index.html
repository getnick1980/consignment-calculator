<!DOCTYPE html>
<html>
<head>
  <title>Consignment Calculator</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    input { font-size: 18px; padding: 12px; width: 200px; }
    iframe { width: 100%; height: 900px; border: none; margin-top: 20px; }
  </style>
</head>
<body>

  <h2>Enter Sale Price</h2>
  <input type="number" id="salePrice" placeholder="Enter sale amount" oninput="update()">

  <iframe id="frame" src=""></iframe>

  <script>
    function update() {
      let price = document.getElementById("salePrice").value;
      let frame = document.getElementById("frame");
      
      if (price) {
        frame.src = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTaw0RrL5tsjG83-C3iEFWYJNLW2KlizBMWv6CHcylWVd262-_TBpgCtTvpRJTy4NXBZcrYc87Db_2U/pubhtml?gid=1364386720&single=true";
      } else {
        frame.src = "";
      }
    }
  </script>

</body>
</html>
