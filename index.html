<!DOCTYPE html>
<html>
<head>
  <title>Consignment Calculator</title>
  <style>
    body { margin:20px; font-family:Arial,sans-serif; }
    input { font-size:18px; padding:10px; width:180px; }
    iframe { width:100%; height:850px; border:2px solid #ddd; border-radius:8px; margin-top:20px; }
  </style>
</head>
<body>
  <h2>Sale Price: <input type="number" id="price" value="100" onchange="updatePrice(this.value)"></h2>
  
  <iframe id="frame" src="https://docs.google.com/spreadsheets/d/e/2PACX-1vTaw0RrL5tsjG83-C3iEFWYJNLW2KlizBMWv6CHcylWVd262-_TBpgCtTvpRJTy4NXBZcrYc87Db_2U/pubhtml?gid=204546721&single=true"></iframe>

  <script>
    function updatePrice(price) {
      const iframe = document.getElementById("frame");
      iframe.src = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTaw0RrL5tsjG83-C3iEFWYJNLW2KlizBMWv6CHcylWVd262-_TBpgCtTvpRJTy4NXBZcrYc87Db_2U/pubhtml?gid=204546721&single=true&price=" + price;
    }
  </script>
</body>
</html>
