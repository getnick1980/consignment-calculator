<!DOCTYPE html>
<html>
<head>
  <title>Consignment Calculator</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    h2 { margin-bottom: 5px; }
    input { padding: 12px; font-size: 18px; width: 180px; }
    table { margin-top: 20px; border-collapse: collapse; width: 100%; max-width: 900px; }
    th, td { padding: 10px; border: 1px solid #ccc; text-align: right; }
    th { text-align: left; background: #f5f5f5; }
  </style>
</head>
<body>
  <h2>Enter Sale Price</h2>
  <input type="number" id="salePrice" placeholder="Sale amount" value="100" oninput="updateTable()">

  <h2>Results</h2>
  <table id="resultsTable"></table>

  <script>
    const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTaw0RrL5tsjG83-C3iEFWYJNLW2KlizBMWv6CHcylWVd262-_TBpgCtTvpRJTy4NXBZcrYc87Db_2U/pubhtml?gid=204546721&single=true";

    async function updateTable() {
      let html = await fetch(url).then(r => r.text());
      let parser = new DOMParser();
      let doc = parser.parseFromString(html, "text/html");
      let table = doc.querySelector("table");
      if (table) {
        document.getElementById("resultsTable").innerHTML = table.innerHTML;
      } else {
        document.getElementById("resultsTable").innerHTML = "<tr><td>Could not load table. Try refreshing.</td></tr>";
      }
    }
    updateTable();
  </script>
</body>
</html>
